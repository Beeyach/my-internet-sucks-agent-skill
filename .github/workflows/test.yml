name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m py_compile skill/my-internet-sucks/scripts/netmode.py install.py
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Installer smoke test
        run: python install.py --target claude --target codex --scope project --project-root agent-skill-demo
