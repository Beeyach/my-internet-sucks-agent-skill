name: Publish v0.1.0 once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-time-release.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Remove one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/one-time-release.yml
          git commit -m "Remove one-time release workflow"
          git push origin HEAD:main
          echo "RELEASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Publish v0.1.0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v0.1.0 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v0.1.0 already exists."
          else
            gh release create v0.1.0 \
              --repo "$GITHUB_REPOSITORY" \
              --target "$RELEASE_SHA" \
              --title "v0.1.0" \
              --notes-file - <<'EOF'
          First public release of My Internet Sucks.

          An interruption-safe Agent Skill for Claude Code and Codex on slow, unstable, or metered internet.

          Highlights:
          - Saves local checkpoints before risky network work
          - Records unfinished network jobs in a private local ledger
          - Retries only operations that are safe to repeat
          - Marks deployments, publishing, releases, and migrations as verify-first
          - Redacts secrets from saved resume commands
          - Installs into Claude Code or Codex from one canonical skill
          - Includes nine automated tests and cross-platform CI for Windows, macOS, and Linux

          See the README for installation and usage.
          EOF
